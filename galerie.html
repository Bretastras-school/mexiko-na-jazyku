<!DOCTYPE html>

    <link rel="stylesheet" href="style.css">
    <style>
        /* Speciální mřížka pro galerii, doplňující tvůj style.css */
        .gallery-grid {
            display: grid;
            /* Responzivní mřížka: 3 sloupce na velkém monitoru, méně na menším */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
    </style>
</head>
